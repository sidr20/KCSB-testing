name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate API entrypoint
        run: python -c "import apps.api.__main__"

      - name: Run API tests
        run: python -m unittest discover -s apps/api/tests -v

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Run web tests
        run: |
          node apps/web/tests/evidenceNavigation.test.mjs
          node apps/web/tests/pbpAdvancedFilters.test.mjs

      - name: Build web app
        run: npm --prefix apps/web run build
